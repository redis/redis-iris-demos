<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 590 817">
  <!-- LEFT BACKGROUND: Banking UI elements faded behind hero -->
  <!-- All elements constrained to x < 236 (left 40%) -->

  <!-- ============================================= -->
  <!-- TOP-LEFT: Account Balance Card (y: 30-250)    -->
  <!-- ============================================= -->

  <!-- Card shadow -->
  <g transform="rotate(-5, 100, 130)">
    <rect x="-16" y="54" width="220" height="140" rx="14" fill="#8fb3a8" opacity="0.12"/>
  </g>

  <!-- Card body -->
  <g transform="rotate(-5, 100, 130)">
    <rect x="-20" y="50" width="220" height="140" rx="14" fill="#d5f0e0" opacity="0.55"/>
    <!-- Card border -->
    <rect x="-20" y="50" width="220" height="140" rx="14" fill="none" stroke="#2ecc71" stroke-width="1.2" opacity="0.20"/>

    <!-- "Checking Account" label line -->
    <rect x="0" y="75" width="80" height="3" rx="1.5" fill="#8fb3a8" opacity="0.35"/>

    <!-- Dollar balance amount (larger, bolder) -->
    <rect x="0" y="95" width="120" height="6" rx="3" fill="#8fb3a8" opacity="0.40"/>

    <!-- "Available balance" subtext line 1 -->
    <rect x="0" y="118" width="65" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.25"/>
    <!-- "Available balance" subtext line 2 -->
    <rect x="0" y="128" width="50" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.20"/>

    <!-- Small accent bar at top of card -->
    <rect x="-20" y="50" width="220" height="5" rx="14" fill="#2ecc71" opacity="0.18"/>

    <!-- Small status indicator dot -->
    <circle cx="175" cy="75" r="4" fill="#2ecc71" opacity="0.25"/>
  </g>

  <!-- Secondary smaller card peeking from top-left -->
  <g transform="rotate(-12, 40, 40)">
    <rect x="-60" y="-10" width="140" height="80" rx="10" fill="#b8e6cc" opacity="0.30"/>
    <rect x="-60" y="-10" width="140" height="80" rx="10" fill="none" stroke="#2ecc71" stroke-width="0.8" opacity="0.15"/>
    <rect x="-40" y="15" width="60" height="3" rx="1.5" fill="#8fb3a8" opacity="0.25"/>
    <rect x="-40" y="28" width="85" height="5" rx="2.5" fill="#8fb3a8" opacity="0.30"/>
  </g>


  <!-- ============================================= -->
  <!-- MID-LEFT: Transaction List (y: 320-550)       -->
  <!-- ============================================= -->

  <!-- Transaction list container -->
  <rect x="5" y="310" width="210" height="240" rx="12" fill="#d5f0e0" opacity="0.30"/>
  <rect x="5" y="310" width="210" height="240" rx="12" fill="none" stroke="#2ecc71" stroke-width="0.8" opacity="0.15"/>

  <!-- "Recent Transactions" header line -->
  <rect x="18" y="325" width="100" height="3.5" rx="1.75" fill="#8fb3a8" opacity="0.35"/>
  <!-- Divider line under header -->
  <line x1="18" y1="340" x2="200" y2="340" stroke="#2ecc71" stroke-width="0.6" opacity="0.15"/>

  <!-- Transaction Row 1 -->
  <circle cx="30" cy="362" r="8" fill="#b8e6cc" opacity="0.45"/>
  <circle cx="30" cy="362" r="8" fill="none" stroke="#2ecc71" stroke-width="0.6" opacity="0.20"/>
  <rect x="46" y="357" width="72" height="3" rx="1.5" fill="#8fb3a8" opacity="0.35"/>
  <rect x="46" y="365" width="48" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.22"/>
  <rect x="160" y="358" width="40" height="3.5" rx="1.75" fill="#8fb3a8" opacity="0.30"/>

  <!-- Transaction Row 2 -->
  <circle cx="30" cy="407" r="8" fill="#d5f0e0" opacity="0.50"/>
  <circle cx="30" cy="407" r="8" fill="none" stroke="#2ecc71" stroke-width="0.6" opacity="0.20"/>
  <rect x="46" y="402" width="85" height="3" rx="1.5" fill="#8fb3a8" opacity="0.32"/>
  <rect x="46" y="410" width="55" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.20"/>
  <rect x="165" y="403" width="35" height="3.5" rx="1.75" fill="#8fb3a8" opacity="0.28"/>

  <!-- Transaction Row 3 -->
  <circle cx="30" cy="452" r="8" fill="#b8e6cc" opacity="0.40"/>
  <circle cx="30" cy="452" r="8" fill="none" stroke="#2ecc71" stroke-width="0.6" opacity="0.20"/>
  <rect x="46" y="447" width="65" height="3" rx="1.5" fill="#8fb3a8" opacity="0.30"/>
  <rect x="46" y="455" width="42" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.20"/>
  <rect x="155" y="448" width="45" height="3.5" rx="1.75" fill="#2ecc71" opacity="0.22"/>

  <!-- Transaction Row 4 -->
  <circle cx="30" cy="497" r="8" fill="#d5f0e0" opacity="0.45"/>
  <circle cx="30" cy="497" r="8" fill="none" stroke="#2ecc71" stroke-width="0.6" opacity="0.20"/>
  <rect x="46" y="492" width="78" height="3" rx="1.5" fill="#8fb3a8" opacity="0.28"/>
  <rect x="46" y="500" width="52" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.18"/>
  <rect x="162" y="493" width="38" height="3.5" rx="1.75" fill="#8fb3a8" opacity="0.26"/>

  <!-- Divider lines between rows -->
  <line x1="18" y1="385" x2="200" y2="385" stroke="#2ecc71" stroke-width="0.4" opacity="0.12"/>
  <line x1="18" y1="430" x2="200" y2="430" stroke="#2ecc71" stroke-width="0.4" opacity="0.12"/>
  <line x1="18" y1="475" x2="200" y2="475" stroke="#2ecc71" stroke-width="0.4" opacity="0.12"/>
  <line x1="18" y1="520" x2="200" y2="520" stroke="#2ecc71" stroke-width="0.4" opacity="0.12"/>

  <!-- Transaction Row 5 (partially visible, fading out) -->
  <circle cx="30" cy="537" r="8" fill="#b8e6cc" opacity="0.25"/>
  <rect x="46" y="532" width="70" height="3" rx="1.5" fill="#8fb3a8" opacity="0.18"/>
  <rect x="46" y="540" width="45" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.12"/>


  <!-- ============================================= -->
  <!-- BOTTOM-LEFT: Credit/Debit Card (y: 600-800)   -->
  <!-- ============================================= -->

  <!-- Card shadow -->
  <g transform="rotate(15, 80, 700)">
    <rect x="-26" y="640" width="200" height="126" rx="12" fill="#8fb3a8" opacity="0.10"/>
  </g>

  <!-- Card body -->
  <g transform="rotate(15, 80, 700)">
    <!-- Card background with gradient-like layering -->
    <rect x="-30" y="636" width="200" height="126" rx="12" fill="#d5f0e0" opacity="0.50"/>
    <rect x="-30" y="636" width="200" height="126" rx="12" fill="none" stroke="#2ecc71" stroke-width="1" opacity="0.22"/>

    <!-- Decorative arc on card (like real bank cards have) -->
    <path d="M-30 720 Q70 680 170 740" fill="none" stroke="#b8e6cc" stroke-width="20" opacity="0.20"/>

    <!-- EMV Chip -->
    <rect x="-2" y="664" width="22" height="17" rx="3" fill="#d4af37" opacity="0.22"/>
    <rect x="2" y="668" width="14" height="9" rx="1.5" fill="#d4af37" opacity="0.15"/>
    <!-- Chip lines -->
    <line x1="4" y1="672" x2="14" y2="672" stroke="#d4af37" stroke-width="0.5" opacity="0.20"/>
    <line x1="9" y1="669" x2="9" y2="676" stroke="#d4af37" stroke-width="0.5" opacity="0.20"/>

    <!-- Card number placeholders (4 groups) -->
    <rect x="-2" y="698" width="30" height="4" rx="2" fill="#8fb3a8" opacity="0.30"/>
    <rect x="38" y="698" width="30" height="4" rx="2" fill="#8fb3a8" opacity="0.28"/>
    <rect x="78" y="698" width="30" height="4" rx="2" fill="#8fb3a8" opacity="0.26"/>
    <rect x="118" y="698" width="30" height="4" rx="2" fill="#8fb3a8" opacity="0.24"/>

    <!-- Cardholder name line -->
    <rect x="-2" y="722" width="75" height="3" rx="1.5" fill="#8fb3a8" opacity="0.28"/>

    <!-- Expiry date line -->
    <rect x="-2" y="735" width="35" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.22"/>

    <!-- Card network logo placeholder (small rounded rect) -->
    <rect x="130" y="730" width="30" height="20" rx="4" fill="#b8e6cc" opacity="0.35"/>
    <circle cx="140" cy="740" r="7" fill="#2ecc71" opacity="0.15"/>
    <circle cx="148" cy="740" r="7" fill="#d4af37" opacity="0.15"/>
  </g>

  <!-- Decorative dots near card area -->
  <circle cx="10" cy="620" r="2" fill="#2ecc71" opacity="0.18"/>
  <circle cx="50" cy="610" r="1.5" fill="#b8e6cc" opacity="0.22"/>
  <circle cx="30" cy="800" r="2.5" fill="#2ecc71" opacity="0.15"/>

  <!-- Small "quick action" buttons suggestion near mid area -->
  <g transform="translate(10, 270)">
    <rect x="0" y="0" width="40" height="40" rx="10" fill="#b8e6cc" opacity="0.30"/>
    <rect x="12" y="14" width="16" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.25"/>
    <rect x="14" y="20" width="12" height="2" rx="1" fill="#8fb3a8" opacity="0.18"/>

    <rect x="52" y="0" width="40" height="40" rx="10" fill="#d5f0e0" opacity="0.35"/>
    <rect x="64" y="14" width="16" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.25"/>
    <rect x="66" y="20" width="12" height="2" rx="1" fill="#8fb3a8" opacity="0.18"/>

    <rect x="104" y="0" width="40" height="40" rx="10" fill="#b8e6cc" opacity="0.28"/>
    <rect x="116" y="14" width="16" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.22"/>
    <rect x="118" y="20" width="12" height="2" rx="1" fill="#8fb3a8" opacity="0.15"/>
  </g>
</svg>
