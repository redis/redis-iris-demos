<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 632 817">
  <!-- RIGHT BACKGROUND: Banking UI elements faded behind hero -->
  <!-- All elements constrained to x > 379 (right 40%) -->

  <!-- ============================================= -->
  <!-- TOP-RIGHT: Phone Mockup with Banking UI       -->
  <!-- (y: 20-280)                                   -->
  <!-- ============================================= -->

  <g transform="rotate(8, 560, 160)">
    <!-- Phone outer shell -->
    <rect x="468" y="10" width="186" height="370" rx="22" fill="#d5f0e0" opacity="0.40"/>
    <rect x="468" y="10" width="186" height="370" rx="22" fill="none" stroke="#2ecc71" stroke-width="1.5" opacity="0.22"/>

    <!-- Phone screen area -->
    <rect x="476" y="22" width="170" height="346" rx="16" fill="#b8e6cc" opacity="0.25"/>

    <!-- Status bar at top of phone -->
    <rect x="486" y="30" width="24" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.30"/>
    <rect x="620" y="30" width="18" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.25"/>
    <!-- Notch/dynamic island -->
    <rect x="536" y="28" width="50" height="6" rx="3" fill="#8fb3a8" opacity="0.15"/>

    <!-- User avatar circle + greeting line -->
    <circle cx="500" cy="56" r="10" fill="#d5f0e0" opacity="0.50"/>
    <circle cx="500" cy="56" r="10" fill="none" stroke="#2ecc71" stroke-width="0.8" opacity="0.20"/>
    <rect x="518" y="50" width="60" height="3" rx="1.5" fill="#8fb3a8" opacity="0.30"/>
    <rect x="518" y="58" width="40" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.22"/>

    <!-- "Total Balance" card inside phone -->
    <rect x="486" y="78" width="150" height="70" rx="10" fill="#d5f0e0" opacity="0.50"/>
    <rect x="486" y="78" width="150" height="70" rx="10" fill="none" stroke="#2ecc71" stroke-width="0.6" opacity="0.18"/>
    <!-- "Total Balance" label -->
    <rect x="496" y="90" width="55" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.28"/>
    <!-- Balance amount -->
    <rect x="496" y="102" width="90" height="5.5" rx="2.75" fill="#8fb3a8" opacity="0.38"/>
    <!-- Change indicator -->
    <rect x="496" y="118" width="30" height="2.5" rx="1.25" fill="#2ecc71" opacity="0.25"/>
    <!-- Small sparkline chart -->
    <path d="M554 122 L564 116 L574 119 L584 112 L594 114 L604 108 L614 110 L624 105" fill="none" stroke="#2ecc71" stroke-width="1" opacity="0.22"/>

    <!-- Quick action row -->
    <rect x="492" y="160" width="28" height="28" rx="8" fill="#b8e6cc" opacity="0.35"/>
    <rect x="528" y="160" width="28" height="28" rx="8" fill="#d5f0e0" opacity="0.35"/>
    <rect x="564" y="160" width="28" height="28" rx="8" fill="#b8e6cc" opacity="0.30"/>
    <rect x="600" y="160" width="28" height="28" rx="8" fill="#d5f0e0" opacity="0.30"/>
    <!-- Action labels -->
    <rect x="494" y="194" width="24" height="2" rx="1" fill="#8fb3a8" opacity="0.20"/>
    <rect x="530" y="194" width="24" height="2" rx="1" fill="#8fb3a8" opacity="0.20"/>
    <rect x="566" y="194" width="24" height="2" rx="1" fill="#8fb3a8" opacity="0.18"/>
    <rect x="602" y="194" width="24" height="2" rx="1" fill="#8fb3a8" opacity="0.18"/>

    <!-- Transaction list inside phone -->
    <rect x="486" y="210" width="150" height="3" rx="1.5" fill="#8fb3a8" opacity="0.28"/>

    <!-- Phone transaction row 1 -->
    <circle cx="498" cy="230" r="6" fill="#b8e6cc" opacity="0.40"/>
    <rect x="510" y="226" width="55" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.28"/>
    <rect x="510" y="233" width="35" height="2" rx="1" fill="#8fb3a8" opacity="0.18"/>
    <rect x="605" y="227" width="28" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.25"/>

    <!-- Phone transaction row 2 -->
    <circle cx="498" cy="255" r="6" fill="#d5f0e0" opacity="0.45"/>
    <rect x="510" y="251" width="48" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.25"/>
    <rect x="510" y="258" width="40" height="2" rx="1" fill="#8fb3a8" opacity="0.16"/>
    <rect x="608" y="252" width="25" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.22"/>

    <!-- Phone transaction row 3 -->
    <circle cx="498" cy="280" r="6" fill="#b8e6cc" opacity="0.35"/>
    <rect x="510" y="276" width="60" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.22"/>
    <rect x="510" y="283" width="32" height="2" rx="1" fill="#8fb3a8" opacity="0.15"/>
    <rect x="610" y="277" width="23" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.20"/>

    <!-- Phone transaction row 4 -->
    <circle cx="498" cy="305" r="6" fill="#d5f0e0" opacity="0.30"/>
    <rect x="510" y="301" width="52" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.20"/>
    <rect x="510" y="308" width="38" height="2" rx="1" fill="#8fb3a8" opacity="0.14"/>
    <rect x="612" y="302" width="21" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.18"/>

    <!-- Dividers inside phone -->
    <line x1="492" y1="243" x2="630" y2="243" stroke="#2ecc71" stroke-width="0.3" opacity="0.12"/>
    <line x1="492" y1="268" x2="630" y2="268" stroke="#2ecc71" stroke-width="0.3" opacity="0.12"/>
    <line x1="492" y1="293" x2="630" y2="293" stroke="#2ecc71" stroke-width="0.3" opacity="0.12"/>

    <!-- Bottom nav bar in phone -->
    <line x1="486" y1="340" x2="636" y2="340" stroke="#2ecc71" stroke-width="0.4" opacity="0.15"/>
    <circle cx="506" cy="355" r="4" fill="#2ecc71" opacity="0.22"/>
    <circle cx="536" cy="355" r="4" fill="#8fb3a8" opacity="0.15"/>
    <circle cx="566" cy="355" r="4" fill="#8fb3a8" opacity="0.15"/>
    <circle cx="596" cy="355" r="4" fill="#8fb3a8" opacity="0.15"/>
    <rect x="498" y="362" width="16" height="1.5" rx="0.75" fill="#2ecc71" opacity="0.18"/>
    <rect x="528" y="362" width="16" height="1.5" rx="0.75" fill="#8fb3a8" opacity="0.12"/>
    <rect x="558" y="362" width="16" height="1.5" rx="0.75" fill="#8fb3a8" opacity="0.12"/>
    <rect x="588" y="362" width="16" height="1.5" rx="0.75" fill="#8fb3a8" opacity="0.12"/>
  </g>


  <!-- ============================================= -->
  <!-- MID-RIGHT: Spending Pie Chart (y: 350-520)    -->
  <!-- ============================================= -->

  <g transform="translate(540, 440)">
    <!-- Pie chart segments using arc paths -->
    <!-- Segment 1: ~120 degrees (top-right) -->
    <path d="M0 0 L0 -55 A55 55 0 0 1 47.6 -27.5 Z" fill="#2ecc71" opacity="0.25"/>
    <!-- Segment 2: ~90 degrees -->
    <path d="M0 0 L47.6 -27.5 A55 55 0 0 1 47.6 27.5 Z" fill="#d5f0e0" opacity="0.40"/>
    <!-- Segment 3: ~80 degrees -->
    <path d="M0 0 L47.6 27.5 A55 55 0 0 1 -10.4 53.9 Z" fill="#b8e6cc" opacity="0.45"/>
    <!-- Segment 4: ~70 degrees (remaining) -->
    <path d="M0 0 L-10.4 53.9 A55 55 0 0 1 -55 0 Z" fill="#d4af37" opacity="0.20"/>

    <!-- Center hole to make it a donut chart -->
    <circle cx="0" cy="0" r="28" fill="#E8F8EE" opacity="0.80"/>

    <!-- Center amount placeholder -->
    <rect x="-14" y="-4" width="28" height="4" rx="2" fill="#8fb3a8" opacity="0.30"/>
    <rect x="-10" y="5" width="20" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.20"/>

    <!-- Pie chart outer ring -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="#2ecc71" stroke-width="0.5" opacity="0.15"/>
  </g>

  <!-- Legend items next to pie chart -->
  <g transform="translate(395, 410)">
    <rect x="0" y="0" width="8" height="8" rx="2" fill="#2ecc71" opacity="0.30"/>
    <rect x="14" y="1" width="42" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.28"/>
    <rect x="64" y="1" width="22" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.22"/>

    <rect x="0" y="18" width="8" height="8" rx="2" fill="#d5f0e0" opacity="0.45"/>
    <rect x="14" y="19" width="50" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.25"/>
    <rect x="72" y="19" width="18" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.20"/>

    <rect x="0" y="36" width="8" height="8" rx="2" fill="#b8e6cc" opacity="0.50"/>
    <rect x="14" y="37" width="38" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.22"/>
    <rect x="58" y="37" width="25" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.18"/>

    <rect x="0" y="54" width="8" height="8" rx="2" fill="#d4af37" opacity="0.25"/>
    <rect x="14" y="55" width="45" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.20"/>
    <rect x="66" y="55" width="20" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.16"/>
  </g>

  <!-- "Spending Breakdown" title above chart -->
  <rect x="395" y="390" width="80" height="3" rx="1.5" fill="#8fb3a8" opacity="0.30"/>


  <!-- ============================================= -->
  <!-- BOTTOM-RIGHT: Account Summary Cards           -->
  <!-- (y: 580-800)                                  -->
  <!-- ============================================= -->

  <!-- Account Card 1 (top of stack) -->
  <g transform="translate(420, 585)">
    <rect x="0" y="0" width="170" height="80" rx="10" fill="#d5f0e0" opacity="0.50"/>
    <rect x="0" y="0" width="170" height="80" rx="10" fill="none" stroke="#2ecc71" stroke-width="0.8" opacity="0.18"/>
    <!-- Account type indicator -->
    <rect x="0" y="0" width="4" height="80" rx="2" fill="#2ecc71" opacity="0.30"/>
    <!-- Account name line -->
    <rect x="16" y="14" width="70" height="3" rx="1.5" fill="#8fb3a8" opacity="0.32"/>
    <!-- Account number placeholder -->
    <rect x="16" y="24" width="45" height="2" rx="1" fill="#8fb3a8" opacity="0.18"/>
    <!-- Balance amount -->
    <rect x="16" y="42" width="85" height="5" rx="2.5" fill="#8fb3a8" opacity="0.35"/>
    <!-- Status label -->
    <rect x="16" y="58" width="35" height="2.5" rx="1.25" fill="#2ecc71" opacity="0.22"/>
    <!-- Icon placeholder -->
    <circle cx="148" cy="22" r="8" fill="#b8e6cc" opacity="0.35"/>
  </g>

  <!-- Account Card 2 (overlapping, shifted down and right) -->
  <g transform="translate(440, 655)">
    <rect x="0" y="0" width="170" height="80" rx="10" fill="#b8e6cc" opacity="0.40"/>
    <rect x="0" y="0" width="170" height="80" rx="10" fill="none" stroke="#2ecc71" stroke-width="0.8" opacity="0.15"/>
    <!-- Account type indicator -->
    <rect x="0" y="0" width="4" height="80" rx="2" fill="#d4af37" opacity="0.25"/>
    <!-- Account name -->
    <rect x="16" y="14" width="60" height="3" rx="1.5" fill="#8fb3a8" opacity="0.28"/>
    <!-- Account number -->
    <rect x="16" y="24" width="50" height="2" rx="1" fill="#8fb3a8" opacity="0.16"/>
    <!-- Balance -->
    <rect x="16" y="42" width="75" height="5" rx="2.5" fill="#8fb3a8" opacity="0.30"/>
    <!-- Status -->
    <rect x="16" y="58" width="40" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.18"/>
    <!-- Icon -->
    <circle cx="148" cy="22" r="8" fill="#d5f0e0" opacity="0.40"/>
  </g>

  <!-- Account Card 3 (bottom, most offset) -->
  <g transform="translate(460, 725)">
    <rect x="0" y="0" width="170" height="80" rx="10" fill="#d5f0e0" opacity="0.35"/>
    <rect x="0" y="0" width="170" height="80" rx="10" fill="none" stroke="#2ecc71" stroke-width="0.8" opacity="0.12"/>
    <!-- Account type indicator -->
    <rect x="0" y="0" width="4" height="80" rx="2" fill="#2ecc71" opacity="0.22"/>
    <!-- Account name -->
    <rect x="16" y="14" width="55" height="3" rx="1.5" fill="#8fb3a8" opacity="0.24"/>
    <!-- Account number -->
    <rect x="16" y="24" width="48" height="2" rx="1" fill="#8fb3a8" opacity="0.14"/>
    <!-- Balance -->
    <rect x="16" y="42" width="70" height="5" rx="2.5" fill="#8fb3a8" opacity="0.26"/>
    <!-- Status -->
    <rect x="16" y="58" width="32" height="2.5" rx="1.25" fill="#8fb3a8" opacity="0.15"/>
    <!-- Icon -->
    <circle cx="148" cy="22" r="8" fill="#b8e6cc" opacity="0.30"/>
  </g>

  <!-- "Your Accounts" header above cards -->
  <rect x="420" y="570" width="72" height="3.5" rx="1.75" fill="#8fb3a8" opacity="0.30"/>

  <!-- Decorative dots -->
  <circle cx="415" cy="560" r="2" fill="#2ecc71" opacity="0.18"/>
  <circle cx="620" cy="540" r="1.5" fill="#b8e6cc" opacity="0.20"/>
  <circle cx="600" cy="810" r="2" fill="#2ecc71" opacity="0.15"/>
</svg>
