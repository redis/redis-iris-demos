<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 632 817">

  <!-- =====================================================
       RedHealthConnect — Right Edge Background
       Healthcare portal UI elements (calendar, provider, referrals)
       Elements confined to right ~38% of viewBox (x > 392)
       ===================================================== -->

  <!-- ============================================================
       TOP-RIGHT: CALENDAR / SCHEDULE VIEW (y: 20-260)
       ============================================================ -->
  <g>
    <!-- Card background -->
    <rect x="445" y="20" width="210" height="230" rx="12" ry="12"
          fill="#d4eaf4" opacity="0.50"
          stroke="#4cc2ff" stroke-width="1" stroke-opacity="0.20"/>

    <!-- Month/year header line -->
    <rect x="465" y="36" width="70" height="5" rx="2" fill="#7a9aad" opacity="0.35"/>

    <!-- Navigation arrows (small triangles) -->
    <path d="M555,38 L561,34 L561,42 Z" fill="#7a9aad" opacity="0.25"/>
    <path d="M575,38 L569,34 L569,42 Z" fill="#7a9aad" opacity="0.25"/>

    <!-- Divider below month -->
    <line x1="445" y1="52" x2="655" y2="52" stroke="#4cc2ff" stroke-width="0.6" stroke-opacity="0.15"/>

    <!-- Day-of-week labels (7 tiny lines) -->
    <rect x="460" y="60" width="14" height="3" rx="1.5" fill="#7a9aad" opacity="0.25"/>
    <rect x="486" y="60" width="14" height="3" rx="1.5" fill="#7a9aad" opacity="0.25"/>
    <rect x="512" y="60" width="14" height="3" rx="1.5" fill="#7a9aad" opacity="0.25"/>
    <rect x="538" y="60" width="14" height="3" rx="1.5" fill="#7a9aad" opacity="0.25"/>
    <rect x="564" y="60" width="14" height="3" rx="1.5" fill="#7a9aad" opacity="0.25"/>
    <rect x="590" y="60" width="14" height="3" rx="1.5" fill="#7a9aad" opacity="0.25"/>
    <rect x="616" y="60" width="14" height="3" rx="1.5" fill="#7a9aad" opacity="0.25"/>

    <!-- Calendar grid: 7 cols x 5 rows of day cells -->
    <!-- Row 1 -->
    <rect x="458" y="74" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="484" y="74" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="510" y="74" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="536" y="74" width="22" height="22" rx="4" fill="#4cc2ff" opacity="0.25"/><!-- appointment day -->
    <rect x="562" y="74" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="588" y="74" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="614" y="74" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>

    <!-- Row 2 -->
    <rect x="458" y="100" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="484" y="100" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="510" y="100" width="22" height="22" rx="4" fill="#4cc2ff" opacity="0.25"/><!-- appointment day -->
    <rect x="536" y="100" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="562" y="100" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="588" y="100" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="614" y="100" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>

    <!-- Row 3 -->
    <rect x="458" y="126" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="484" y="126" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="510" y="126" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="536" y="126" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="562" y="126" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="588" y="126" width="22" height="22" rx="4" fill="#4cc2ff" opacity="0.25"/><!-- appointment day -->
    <rect x="614" y="126" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>

    <!-- Row 4 -->
    <rect x="458" y="152" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="484" y="152" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="510" y="152" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="536" y="152" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="562" y="152" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="588" y="152" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="614" y="152" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>

    <!-- Row 5 (partial) -->
    <rect x="458" y="178" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="484" y="178" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>
    <rect x="510" y="178" width="22" height="22" rx="4" fill="#bdd8e8" opacity="0.30"/>

    <!-- Small dots on appointment days to mark them -->
    <circle cx="547" cy="91" r="2.5" fill="#4cc2ff" opacity="0.45"/>
    <circle cx="521" cy="117" r="2.5" fill="#4cc2ff" opacity="0.45"/>
    <circle cx="599" cy="143" r="2.5" fill="#4cc2ff" opacity="0.45"/>

    <!-- Upcoming event preview lines at bottom of card -->
    <line x1="458" y1="212" x2="640" y2="212" stroke="#4cc2ff" stroke-width="0.5" stroke-opacity="0.15"/>
    <circle cx="470" cy="228" r="6" fill="#bdd8e8" opacity="0.40"/>
    <rect x="482" y="224" width="80" height="4" rx="2" fill="#7a9aad" opacity="0.28"/>
    <rect x="482" y="232" width="55" height="3" rx="2" fill="#7a9aad" opacity="0.20"/>
  </g>


  <!-- ============================================================
       MID-RIGHT: PROVIDER PROFILE CARD (y: 300-520)
       ============================================================ -->
  <g>
    <!-- Card background -->
    <rect x="475" y="300" width="180" height="200" rx="10" ry="10"
          fill="#d4eaf4" opacity="0.45"
          stroke="#4cc2ff" stroke-width="0.8" stroke-opacity="0.18"/>

    <!-- Doctor photo circle -->
    <circle cx="565" cy="345" r="25" fill="#bdd8e8" opacity="0.50"/>
    <!-- Inner circle detail -->
    <circle cx="565" cy="340" r="10" fill="#d4eaf4" opacity="0.55"/>
    <!-- Shoulders/body hint below circle -->
    <path d="M545,365 Q565,375 585,365" fill="none" stroke="#bdd8e8" stroke-width="2" stroke-opacity="0.35"/>

    <!-- Doctor name line -->
    <rect x="520" y="382" width="90" height="5" rx="2" fill="#7a9aad" opacity="0.35"/>

    <!-- Specialty line -->
    <rect x="530" y="394" width="70" height="3.5" rx="2" fill="#7a9aad" opacity="0.25"/>

    <!-- Star rating row (5 small circles for stars) -->
    <circle cx="530" cy="414" r="4" fill="#bdd8e8" opacity="0.50"/>
    <circle cx="542" cy="414" r="4" fill="#bdd8e8" opacity="0.50"/>
    <circle cx="554" cy="414" r="4" fill="#bdd8e8" opacity="0.50"/>
    <circle cx="566" cy="414" r="4" fill="#bdd8e8" opacity="0.50"/>
    <circle cx="578" cy="414" r="4" fill="#bdd8e8" opacity="0.35"/>

    <!-- Divider -->
    <line x1="490" y1="430" x2="640" y2="430" stroke="#4cc2ff" stroke-width="0.5" stroke-opacity="0.15"/>

    <!-- "Next available" label line -->
    <rect x="495" y="442" width="78" height="3.5" rx="2" fill="#7a9aad" opacity="0.25"/>
    <!-- Date/time value line -->
    <rect x="495" y="452" width="55" height="4" rx="2" fill="#7a9aad" opacity="0.35"/>

    <!-- "Accepts new patients" label -->
    <circle cx="500" cy="473" r="3.5" fill="#34a853" opacity="0.20"/>
    <rect x="510" y="470" width="85" height="3.5" rx="2" fill="#7a9aad" opacity="0.22"/>

    <!-- "Book Appointment" button -->
    <rect x="505" y="486" width="120" height="22" rx="7" fill="#4cc2ff" opacity="0.18"/>
    <rect x="530" y="495" width="70" height="4" rx="2" fill="#7a9aad" opacity="0.30"/>
  </g>


  <!-- ============================================================
       BOTTOM-RIGHT: REFERRAL / WAITLIST STATUS PANEL (y: 560-800)
       ============================================================ -->
  <g transform="rotate(5, 560, 680)">
    <!-- Card background -->
    <rect x="465" y="560" width="190" height="210" rx="12" ry="12"
          fill="#d4eaf4" opacity="0.50"
          stroke="#4cc2ff" stroke-width="0.8" stroke-opacity="0.20"/>

    <!-- Header: "Referrals" -->
    <rect x="485" y="578" width="65" height="5" rx="2" fill="#7a9aad" opacity="0.38"/>

    <!-- Divider below header -->
    <line x1="465" y1="596" x2="655" y2="596" stroke="#4cc2ff" stroke-width="0.6" stroke-opacity="0.15"/>

    <!-- === Referral Row 1 (Approved) === -->
    <g>
      <!-- Status dot: green (approved) -->
      <circle cx="485" cy="616" r="4.5" fill="#34a853" opacity="0.20"/>
      <!-- Referral type line -->
      <rect x="497" y="610" width="85" height="4" rx="2" fill="#7a9aad" opacity="0.30"/>
      <!-- Status text line -->
      <rect x="497" y="620" width="55" height="3" rx="2" fill="#7a9aad" opacity="0.20"/>
    </g>

    <!-- Divider -->
    <line x1="480" y1="636" x2="640" y2="636" stroke="#4cc2ff" stroke-width="0.4" stroke-opacity="0.12"/>

    <!-- === Referral Row 2 (Pending) === -->
    <g>
      <!-- Status dot: yellow/amber (pending) -->
      <circle cx="485" cy="656" r="4.5" fill="#f5a623" opacity="0.22"/>
      <!-- Referral type line -->
      <rect x="497" y="650" width="78" height="4" rx="2" fill="#7a9aad" opacity="0.30"/>
      <!-- Status text line -->
      <rect x="497" y="660" width="48" height="3" rx="2" fill="#7a9aad" opacity="0.20"/>
    </g>

    <!-- Divider -->
    <line x1="480" y1="676" x2="640" y2="676" stroke="#4cc2ff" stroke-width="0.4" stroke-opacity="0.12"/>

    <!-- === Referral Row 3 (Approved) === -->
    <g>
      <circle cx="485" cy="696" r="4.5" fill="#34a853" opacity="0.20"/>
      <rect x="497" y="690" width="90" height="4" rx="2" fill="#7a9aad" opacity="0.30"/>
      <rect x="497" y="700" width="60" height="3" rx="2" fill="#7a9aad" opacity="0.20"/>
    </g>

    <!-- Progress bar section -->
    <rect x="485" y="725" width="60" height="3.5" rx="2" fill="#7a9aad" opacity="0.22"/>
    <!-- Progress bar background -->
    <rect x="485" y="738" width="140" height="8" rx="4" fill="#bdd8e8" opacity="0.35"/>
    <!-- Progress bar fill -->
    <rect x="485" y="738" width="95" height="8" rx="4" fill="#4cc2ff" opacity="0.25"/>

    <!-- Summary line at bottom -->
    <rect x="485" y="758" width="105" height="3" rx="1.5" fill="#7a9aad" opacity="0.18"/>
  </g>

</svg>
