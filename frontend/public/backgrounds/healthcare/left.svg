<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 590 817">

  <!-- =====================================================
       RedHealthConnect — Left Edge Background
       Healthcare portal UI elements (appointments, meds, metrics)
       Elements confined to left ~38% of viewBox (x < 224)
       ===================================================== -->

  <!-- ============================================================
       TOP-LEFT: UPCOMING APPOINTMENTS PANEL (y: 30-280)
       ============================================================ -->
  <g>
    <!-- Panel background card -->
    <rect x="-15" y="30" width="220" height="240" rx="12" ry="12"
          fill="#d4eaf4" opacity="0.50"
          stroke="#4cc2ff" stroke-width="1" stroke-opacity="0.20"/>

    <!-- Header: "Upcoming Appointments" placeholder line -->
    <rect x="10" y="48" width="110" height="5" rx="2" fill="#7a9aad" opacity="0.35"/>

    <!-- Divider below header -->
    <line x1="-15" y1="68" x2="205" y2="68" stroke="#4cc2ff" stroke-width="0.8" stroke-opacity="0.18"/>

    <!-- === Appointment Row 1 (y ~78) === -->
    <g>
      <!-- Doctor avatar circle -->
      <circle cx="18" cy="94" r="10" fill="#bdd8e8" opacity="0.45"/>
      <!-- Doctor name line -->
      <rect x="34" y="87" width="72" height="4" rx="2" fill="#7a9aad" opacity="0.32"/>
      <!-- Specialty line -->
      <rect x="34" y="96" width="50" height="3" rx="2" fill="#7a9aad" opacity="0.22"/>
      <!-- Time/date badge -->
      <rect x="152" y="85" width="40" height="16" rx="5" fill="#bdd8e8" opacity="0.40"/>
      <rect x="157" y="91" width="30" height="3" rx="1.5" fill="#7a9aad" opacity="0.25"/>
      <!-- Confirmed status dot -->
      <circle cx="200" cy="93" r="4" fill="#34a853" opacity="0.20"/>
    </g>

    <!-- Divider -->
    <line x1="5" y1="118" x2="195" y2="118" stroke="#4cc2ff" stroke-width="0.5" stroke-opacity="0.15"/>

    <!-- === Appointment Row 2 (y ~133) === -->
    <g>
      <circle cx="18" cy="149" r="10" fill="#bdd8e8" opacity="0.45"/>
      <rect x="34" y="142" width="65" height="4" rx="2" fill="#7a9aad" opacity="0.32"/>
      <rect x="34" y="151" width="46" height="3" rx="2" fill="#7a9aad" opacity="0.22"/>
      <rect x="152" y="140" width="40" height="16" rx="5" fill="#bdd8e8" opacity="0.40"/>
      <rect x="157" y="146" width="30" height="3" rx="1.5" fill="#7a9aad" opacity="0.25"/>
      <circle cx="200" cy="148" r="4" fill="#34a853" opacity="0.20"/>
    </g>

    <!-- Divider -->
    <line x1="5" y1="173" x2="195" y2="173" stroke="#4cc2ff" stroke-width="0.5" stroke-opacity="0.15"/>

    <!-- === Appointment Row 3 (y ~188) === -->
    <g>
      <circle cx="18" cy="204" r="10" fill="#bdd8e8" opacity="0.45"/>
      <rect x="34" y="197" width="78" height="4" rx="2" fill="#7a9aad" opacity="0.32"/>
      <rect x="34" y="206" width="54" height="3" rx="2" fill="#7a9aad" opacity="0.22"/>
      <rect x="152" y="195" width="40" height="16" rx="5" fill="#bdd8e8" opacity="0.40"/>
      <rect x="157" y="201" width="30" height="3" rx="1.5" fill="#7a9aad" opacity="0.25"/>
      <circle cx="200" cy="203" r="4" fill="#4cc2ff" opacity="0.18"/>
    </g>

    <!-- Divider -->
    <line x1="5" y1="228" x2="195" y2="228" stroke="#4cc2ff" stroke-width="0.5" stroke-opacity="0.15"/>

    <!-- "View All" button placeholder -->
    <rect x="60" y="240" width="80" height="18" rx="6" fill="#4cc2ff" opacity="0.15"/>
    <rect x="78" y="247" width="44" height="3" rx="1.5" fill="#7a9aad" opacity="0.25"/>
  </g>


  <!-- ============================================================
       MID-LEFT: MEDICATIONS / PRESCRIPTIONS LIST (y: 330-520)
       ============================================================ -->
  <g>
    <!-- Card background -->
    <rect x="5" y="330" width="180" height="180" rx="10" ry="10"
          fill="#d4eaf4" opacity="0.45"
          stroke="#4cc2ff" stroke-width="0.8" stroke-opacity="0.18"/>

    <!-- Header: "Medications" -->
    <rect x="20" y="346" width="80" height="5" rx="2" fill="#7a9aad" opacity="0.35"/>

    <!-- Divider below header -->
    <line x1="5" y1="363" x2="185" y2="363" stroke="#4cc2ff" stroke-width="0.6" stroke-opacity="0.15"/>

    <!-- === Medication Row 1 === -->
    <g>
      <!-- Pill bottle icon: body -->
      <rect x="18" y="375" width="14" height="18" rx="3" fill="#bdd8e8" opacity="0.45"/>
      <!-- Pill bottle icon: cap -->
      <rect x="20" y="371" width="10" height="6" rx="2" fill="#bdd8e8" opacity="0.55"/>
      <!-- Med name line -->
      <rect x="40" y="376" width="68" height="4" rx="2" fill="#7a9aad" opacity="0.30"/>
      <!-- Dosage line -->
      <rect x="40" y="385" width="45" height="3" rx="2" fill="#7a9aad" opacity="0.20"/>
    </g>

    <!-- === Medication Row 2 === -->
    <g>
      <rect x="18" y="410" width="14" height="18" rx="3" fill="#bdd8e8" opacity="0.45"/>
      <rect x="20" y="406" width="10" height="6" rx="2" fill="#bdd8e8" opacity="0.55"/>
      <rect x="40" y="411" width="74" height="4" rx="2" fill="#7a9aad" opacity="0.30"/>
      <rect x="40" y="420" width="50" height="3" rx="2" fill="#7a9aad" opacity="0.20"/>
    </g>

    <!-- === Medication Row 3 === -->
    <g>
      <rect x="18" y="445" width="14" height="18" rx="3" fill="#bdd8e8" opacity="0.45"/>
      <rect x="20" y="441" width="10" height="6" rx="2" fill="#bdd8e8" opacity="0.55"/>
      <rect x="40" y="446" width="60" height="4" rx="2" fill="#7a9aad" opacity="0.30"/>
      <rect x="40" y="455" width="42" height="3" rx="2" fill="#7a9aad" opacity="0.20"/>
    </g>

    <!-- === Medication Row 4 === -->
    <g>
      <rect x="18" y="480" width="14" height="18" rx="3" fill="#bdd8e8" opacity="0.45"/>
      <rect x="20" y="476" width="10" height="6" rx="2" fill="#bdd8e8" opacity="0.55"/>
      <rect x="40" y="481" width="70" height="4" rx="2" fill="#7a9aad" opacity="0.30"/>
      <rect x="40" y="490" width="48" height="3" rx="2" fill="#7a9aad" opacity="0.20"/>
    </g>
  </g>


  <!-- ============================================================
       BOTTOM-LEFT: HEALTH METRICS CARD (y: 570-800)
       ============================================================ -->
  <g transform="rotate(-3, 90, 680)">
    <!-- Card background -->
    <rect x="-10" y="570" width="200" height="210" rx="12" ry="12"
          fill="#d4eaf4" opacity="0.50"
          stroke="#4cc2ff" stroke-width="0.8" stroke-opacity="0.20"/>

    <!-- Header: "Health Summary" -->
    <rect x="12" y="588" width="95" height="5" rx="2" fill="#7a9aad" opacity="0.38"/>

    <!-- Divider below header -->
    <line x1="-10" y1="606" x2="190" y2="606" stroke="#4cc2ff" stroke-width="0.6" stroke-opacity="0.15"/>

    <!-- Heart icon (two overlapping circles + triangle) -->
    <g transform="translate(38, 636)" opacity="0.15">
      <circle cx="-7" cy="0" r="9" fill="#f0a8a8"/>
      <circle cx="7" cy="0" r="9" fill="#f0a8a8"/>
      <path d="M-14,4 L0,20 L14,4" fill="#f0a8a8"/>
    </g>

    <!-- Heart rate zigzag line -->
    <polyline points="70,622 82,622 90,612 96,640 104,608 110,638 118,618 126,630 134,622 160,622"
              fill="none" stroke="#f0a8a8" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" opacity="0.25"/>

    <!-- Metric row 1: label + value -->
    <rect x="12" y="666" width="70" height="4" rx="2" fill="#7a9aad" opacity="0.28"/>
    <rect x="90" y="666" width="45" height="4" rx="2" fill="#7a9aad" opacity="0.35"/>

    <!-- Metric row 2: label + value -->
    <rect x="12" y="686" width="58" height="4" rx="2" fill="#7a9aad" opacity="0.28"/>
    <rect x="78" y="686" width="52" height="4" rx="2" fill="#7a9aad" opacity="0.35"/>

    <!-- Metric row 3: label + value -->
    <rect x="12" y="706" width="65" height="4" rx="2" fill="#7a9aad" opacity="0.28"/>
    <rect x="85" y="706" width="40" height="4" rx="2" fill="#7a9aad" opacity="0.35"/>

    <!-- Small chart area placeholder -->
    <rect x="12" y="726" width="160" height="36" rx="6" fill="#bdd8e8" opacity="0.25"/>
    <!-- Mini bar chart inside -->
    <rect x="22" y="746" width="10" height="12" rx="2" fill="#4cc2ff" opacity="0.20"/>
    <rect x="38" y="740" width="10" height="18" rx="2" fill="#4cc2ff" opacity="0.25"/>
    <rect x="54" y="743" width="10" height="15" rx="2" fill="#4cc2ff" opacity="0.22"/>
    <rect x="70" y="738" width="10" height="20" rx="2" fill="#4cc2ff" opacity="0.28"/>
    <rect x="86" y="744" width="10" height="14" rx="2" fill="#4cc2ff" opacity="0.20"/>
    <rect x="102" y="741" width="10" height="17" rx="2" fill="#4cc2ff" opacity="0.24"/>
    <rect x="118" y="748" width="10" height="10" rx="2" fill="#4cc2ff" opacity="0.18"/>
    <rect x="134" y="736" width="10" height="22" rx="2" fill="#4cc2ff" opacity="0.30"/>
  </g>

</svg>
