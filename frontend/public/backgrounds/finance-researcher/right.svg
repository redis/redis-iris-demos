    <!-- Divider -->
    <line x1="470" y1="600" x2="640" y2="600" stroke="#6fd3ff" stroke-width="0.5" opacity="0.18"/>

    <!-- Horizontal bar chart -->

    <!-- Bar 1: 1Y (longest, blue) -->
    <rect x="470" y="614" width="28" height="3" rx="1.5" fill="#9fb0c2" opacity="0.30"/>
    <rect x="505" y="610" width="120" height="12" rx="4" fill="#2791ff" opacity="0.28"/>

    <!-- Bar 2: 6M (medium-long, green) -->
    <rect x="470" y="640" width="24" height="3" rx="1.5" fill="#9fb0c2" opacity="0.30"/>
    <rect x="505" y="636" width="95" height="12" rx="4" fill="#33d6a4" opacity="0.30"/>

    <!-- Bar 3: 3M (shorter, green) -->
    <rect x="470" y="666" width="26" height="3" rx="1.5" fill="#9fb0c2" opacity="0.30"/>
    <rect x="505" y="662" width="68" height="12" rx="4" fill="#33d6a4" opacity="0.25"/>

    <!-- Bar 4: 1M (short, red — loss period) -->
    <rect x="470" y="692" width="22" height="3" rx="1.5" fill="#9fb0c2" opacity="0.30"/>
    <rect x="505" y="688" width="40" height="12" rx="4" fill="#ff6b6b" opacity="0.22"/>

    <!-- Divider before summary -->
    <line x1="470" y1="714" x2="640" y2="714" stroke="#6fd3ff" stroke-width="0.4" opacity="0.15"/>

    <!-- Summary line 1: Total Return -->
    <rect x="470" y="726" width="58" height="4" rx="2" fill="#9fb0c2" opacity="0.30"/>
    <rect x="578" y="726" width="45" height="4" rx="2" fill="#33d6a4" opacity="0.30"/>

    <!-- Summary line 2: Benchmark -->
    <rect x="470" y="746" width="72" height="4" rx="2" fill="#9fb0c2" opacity="0.28"/>
    <rect x="582" y="746" width="40" height="4" rx="2" fill="#9fb0c2" opacity="0.35"/>
  </g>

