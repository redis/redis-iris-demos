    <!-- Donut legend placeholders -->
    <rect x="565" y="494" width="6" height="6" rx="1" fill="#2791ff" opacity="0.30"/>
    <rect x="575" y="495" width="30" height="3" rx="1.5" fill="#9fb0c2" opacity="0.25"/>
    <rect x="565" y="506" width="6" height="6" rx="1" fill="#33d6a4" opacity="0.28"/>
    <rect x="575" y="507" width="35" height="3" rx="1.5" fill="#9fb0c2" opacity="0.25"/>
    <rect x="565" y="518" width="6" height="6" rx="1" fill="#c0d0dc" opacity="0.40"/>
    <rect x="575" y="519" width="25" height="3" rx="1.5" fill="#9fb0c2" opacity="0.25"/>
  </g>

  <!-- ============================================== -->
  <!-- BOTTOM-RIGHT: PERFORMANCE SUMMARY (y: 570-800) -->
  <!-- ============================================== -->
  <g transform="rotate(4, 555, 685)">
    <!-- Card background -->
