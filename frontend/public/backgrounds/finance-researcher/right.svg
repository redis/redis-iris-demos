    <!-- Divider under title -->
    <line x1="480" y1="350" x2="640" y2="350" stroke="#6fd3ff" stroke-width="0.5" opacity="0.20"/>

    <!-- Metric row 1: P/E Ratio -->
    <rect x="480" y="362" width="55" height="4" rx="2" fill="#9fb0c2" opacity="0.30"/>
    <rect x="595" y="362" width="40" height="4" rx="2" fill="#9fb0c2" opacity="0.40"/>

    <!-- Metric row 2: Market Cap -->
    <rect x="480" y="384" width="68" height="4" rx="2" fill="#9fb0c2" opacity="0.30"/>
    <rect x="590" y="384" width="45" height="4" rx="2" fill="#9fb0c2" opacity="0.40"/>

