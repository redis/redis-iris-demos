    <rect x="600" y="436" width="35" height="4" rx="2" fill="#33d6a4" opacity="0.28"/>

    <!-- Metric row 5: Dividend Yield -->
    <rect x="480" y="458" width="60" height="4" rx="2" fill="#9fb0c2" opacity="0.30"/>
    <rect x="602" y="458" width="33" height="4" rx="2" fill="#9fb0c2" opacity="0.35"/>

    <!-- Mini donut chart -->
    <!-- Outer ring segments -->
    <!-- Segment 1 (blue, ~40%) -->
    <path d="M535,505 L535,485 A20,20 0 0,1 553,500 Z"
      fill="#2791ff" opacity="0.30"/>
    <!-- Segment 2 (green, ~35%) -->
    <path d="M535,505 L553,500 A20,20 0 0,1 537,525 Z"
      fill="#33d6a4" opacity="0.28"/>
    <!-- Segment 3 (grey, ~25%) -->
    <path d="M535,505 L537,525 A20,20 0 0,1 535,485 Z"
      fill="#c0d0dc" opacity="0.40"/>
    <!-- Inner hole for donut -->
