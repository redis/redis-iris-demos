<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 632 817" fill="none">

  <!-- ============================================= -->
  <!-- ElectroHub Right Background                   -->
  <!-- Faded e-commerce UI: specs panel, comparison, -->
  <!-- phone app view — frosted shopping interface   -->
  <!-- All elements x > 390                          -->
  <!-- ============================================= -->

  <!-- ===== TOP-RIGHT: Product Specs / Detail Panel ===== -->

  <!-- Specs panel body -->
  <rect x="430" y="20" width="210" height="230" rx="12" fill="#d0e8f7" fill-opacity="0.50" stroke="#31c7ff" stroke-width="1" stroke-opacity="0.20"/>

  <!-- Section header line -->
  <rect x="446" y="38" width="70" height="5" rx="2" fill="#91a3bd" fill-opacity="0.38"/>

  <!-- Divider under header -->
  <line x1="446" y1="52" x2="624" y2="52" stroke="#31c7ff" stroke-width="0.6" stroke-opacity="0.18"/>

  <!-- Spec row 1: label + value -->
  <rect x="446" y="64" width="50" height="3" rx="2" fill="#91a3bd" fill-opacity="0.30"/>
  <rect x="530" y="64" width="80" height="3" rx="2" fill="#91a3bd" fill-opacity="0.22"/>

  <!-- Spec row 2 -->
  <rect x="446" y="88" width="40" height="3" rx="2" fill="#91a3bd" fill-opacity="0.30"/>
  <rect x="530" y="88" width="70" height="3" rx="2" fill="#91a3bd" fill-opacity="0.22"/>

  <!-- Spec row 3 -->
  <rect x="446" y="112" width="55" height="3" rx="2" fill="#91a3bd" fill-opacity="0.28"/>
  <rect x="530" y="112" width="90" height="3" rx="2" fill="#91a3bd" fill-opacity="0.20"/>

  <!-- Spec row 4 -->
  <rect x="446" y="136" width="45" height="3" rx="2" fill="#91a3bd" fill-opacity="0.28"/>
  <rect x="530" y="136" width="60" height="3" rx="2" fill="#91a3bd" fill-opacity="0.22"/>

  <!-- Spec row 5 -->
  <rect x="446" y="160" width="58" height="3" rx="2" fill="#91a3bd" fill-opacity="0.26"/>
  <rect x="530" y="160" width="75" height="3" rx="2" fill="#91a3bd" fill-opacity="0.20"/>

  <!-- Spec row 6 -->
  <rect x="446" y="184" width="42" height="3" rx="2" fill="#91a3bd" fill-opacity="0.26"/>
  <rect x="530" y="184" width="65" height="3" rx="2" fill="#91a3bd" fill-opacity="0.18"/>

  <!-- Spec row 7 -->
  <rect x="446" y="208" width="52" height="3" rx="2" fill="#91a3bd" fill-opacity="0.24"/>
  <rect x="530" y="208" width="55" height="3" rx="2" fill="#91a3bd" fill-opacity="0.18"/>

  <!-- "In Stock" badge -->
  <rect x="446" y="226" width="60" height="16" rx="4" fill="#31c7ff" fill-opacity="0.18" stroke="#31c7ff" stroke-width="0.6" stroke-opacity="0.22"/>
  <rect x="456" y="232" width="40" height="3" rx="2" fill="#91a3bd" fill-opacity="0.30"/>


  <!-- ===== MID-RIGHT: Feature Comparison Checklist ===== -->

  <!-- Comparison panel -->
  <rect x="480" y="300" width="160" height="210" rx="10" fill="#d0e8f7" fill-opacity="0.45" stroke="#31c7ff" stroke-width="0.8" stroke-opacity="0.18"/>

  <!-- Panel header -->
  <rect x="496" y="316" width="65" height="4" rx="2" fill="#91a3bd" fill-opacity="0.36"/>
  <line x1="496" y1="328" x2="624" y2="328" stroke="#31c7ff" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Feature row 1: check circle + text -->
  <circle cx="506" cy="346" r="6" fill="#31c7ff" fill-opacity="0.16" stroke="#31c7ff" stroke-width="0.7" stroke-opacity="0.22"/>
  <!-- Checkmark inside circle -->
  <path d="M503 346 L505 349 L510 343" stroke="#1a6bc4" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.28" fill="none"/>
  <rect x="518" y="344" width="100" height="3" rx="2" fill="#91a3bd" fill-opacity="0.28"/>

  <!-- Feature row 2 -->
  <circle cx="506" cy="374" r="6" fill="#31c7ff" fill-opacity="0.16" stroke="#31c7ff" stroke-width="0.7" stroke-opacity="0.22"/>
  <path d="M503 374 L505 377 L510 371" stroke="#1a6bc4" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.28" fill="none"/>
  <rect x="518" y="372" width="90" height="3" rx="2" fill="#91a3bd" fill-opacity="0.26"/>

  <!-- Feature row 3 -->
  <circle cx="506" cy="402" r="6" fill="#31c7ff" fill-opacity="0.16" stroke="#31c7ff" stroke-width="0.7" stroke-opacity="0.22"/>
  <path d="M503 402 L505 405 L510 399" stroke="#1a6bc4" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.25" fill="none"/>
  <rect x="518" y="400" width="80" height="3" rx="2" fill="#91a3bd" fill-opacity="0.25"/>

  <!-- Feature row 4 -->
  <circle cx="506" cy="430" r="6" fill="#31c7ff" fill-opacity="0.14" stroke="#31c7ff" stroke-width="0.7" stroke-opacity="0.20"/>
  <path d="M503 430 L505 433 L510 427" stroke="#1a6bc4" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.22" fill="none"/>
  <rect x="518" y="428" width="95" height="3" rx="2" fill="#91a3bd" fill-opacity="0.24"/>

  <!-- Feature row 5 -->
  <circle cx="506" cy="458" r="6" fill="#b8d4ee" fill-opacity="0.25" stroke="#31c7ff" stroke-width="0.7" stroke-opacity="0.18"/>
  <rect x="518" y="456" width="85" height="3" rx="2" fill="#91a3bd" fill-opacity="0.22"/>

  <!-- Feature row 6 -->
  <circle cx="506" cy="486" r="6" fill="#b8d4ee" fill-opacity="0.22" stroke="#31c7ff" stroke-width="0.7" stroke-opacity="0.16"/>
  <rect x="518" y="484" width="75" height="3" rx="2" fill="#91a3bd" fill-opacity="0.20"/>


  <!-- ===== BOTTOM-RIGHT: Faded Phone with App View ===== -->
  <g transform="rotate(6, 570, 700)">

    <!-- Phone outer shell -->
    <rect x="475" y="560" width="170" height="320" rx="20" fill="#d0e8f7" fill-opacity="0.50" stroke="#31c7ff" stroke-width="1.2" stroke-opacity="0.22"/>

    <!-- Phone screen area -->
    <rect x="485" y="580" width="150" height="280" rx="10" fill="#b8d4ee" fill-opacity="0.20"/>

    <!-- Status bar line -->
    <rect x="495" y="588" width="40" height="2" rx="1" fill="#91a3bd" fill-opacity="0.25"/>
    <rect x="610" y="588" width="18" height="2" rx="1" fill="#91a3bd" fill-opacity="0.25"/>

    <!-- App header / search bar -->
    <rect x="495" y="598" width="130" height="20" rx="5" fill="#d0e8f7" fill-opacity="0.50" stroke="#31c7ff" stroke-width="0.5" stroke-opacity="0.18"/>
    <rect x="505" y="606" width="60" height="3" rx="2" fill="#91a3bd" fill-opacity="0.25"/>
    <!-- Search icon placeholder -->
    <circle cx="612" cy="608" r="4" stroke="#91a3bd" stroke-width="0.8" stroke-opacity="0.25" fill="none"/>

    <!-- Product card 1 in phone -->
    <rect x="495" y="626" width="130" height="60" rx="6" fill="#d0e8f7" fill-opacity="0.45" stroke="#31c7ff" stroke-width="0.5" stroke-opacity="0.15"/>
    <!-- Thumbnail -->
    <rect x="501" y="632" width="42" height="42" rx="4" fill="#b8d4ee" fill-opacity="0.40"/>
    <!-- Name line -->
    <rect x="550" y="636" width="65" height="3" rx="2" fill="#91a3bd" fill-opacity="0.28"/>
    <!-- Sub line -->
    <rect x="550" y="646" width="45" height="2" rx="1" fill="#91a3bd" fill-opacity="0.20"/>
    <!-- Price -->
    <rect x="550" y="658" width="35" height="3" rx="2" fill="#1a6bc4" fill-opacity="0.25"/>
    <!-- Stars -->
    <circle cx="596" cy="660" r="2" fill="#1a6bc4" fill-opacity="0.20"/>
    <circle cx="604" cy="660" r="2" fill="#1a6bc4" fill-opacity="0.20"/>
    <circle cx="612" cy="660" r="2" fill="#b8d4ee" fill-opacity="0.28"/>

    <!-- Product card 2 in phone -->
    <rect x="495" y="694" width="130" height="60" rx="6" fill="#d0e8f7" fill-opacity="0.40" stroke="#31c7ff" stroke-width="0.5" stroke-opacity="0.14"/>
    <rect x="501" y="700" width="42" height="42" rx="4" fill="#b8d4ee" fill-opacity="0.35"/>
    <rect x="550" y="704" width="60" height="3" rx="2" fill="#91a3bd" fill-opacity="0.26"/>
    <rect x="550" y="714" width="40" height="2" rx="1" fill="#91a3bd" fill-opacity="0.18"/>
    <rect x="550" y="726" width="38" height="3" rx="2" fill="#1a6bc4" fill-opacity="0.22"/>
    <circle cx="600" cy="728" r="2" fill="#1a6bc4" fill-opacity="0.18"/>
    <circle cx="608" cy="728" r="2" fill="#1a6bc4" fill-opacity="0.18"/>
    <circle cx="616" cy="728" r="2" fill="#b8d4ee" fill-opacity="0.24"/>

    <!-- Product card 3 in phone -->
    <rect x="495" y="762" width="130" height="60" rx="6" fill="#d0e8f7" fill-opacity="0.35" stroke="#31c7ff" stroke-width="0.5" stroke-opacity="0.12"/>
    <rect x="501" y="768" width="42" height="42" rx="4" fill="#b8d4ee" fill-opacity="0.30"/>
    <rect x="550" y="772" width="55" height="3" rx="2" fill="#91a3bd" fill-opacity="0.22"/>
    <rect x="550" y="782" width="38" height="2" rx="1" fill="#91a3bd" fill-opacity="0.16"/>
    <rect x="550" y="794" width="32" height="3" rx="2" fill="#1a6bc4" fill-opacity="0.20"/>

    <!-- Bottom nav bar -->
    <rect x="495" y="832" width="130" height="20" rx="4" fill="#d0e8f7" fill-opacity="0.40"/>
    <!-- Nav icons (small circles) -->
    <circle cx="515" cy="842" r="4" fill="#91a3bd" fill-opacity="0.22"/>
    <circle cx="540" cy="842" r="4" fill="#91a3bd" fill-opacity="0.22"/>
    <circle cx="565" cy="842" r="4" fill="#31c7ff" fill-opacity="0.25"/>
    <circle cx="590" cy="842" r="4" fill="#91a3bd" fill-opacity="0.22"/>

    <!-- Phone home indicator -->
    <rect x="535" y="860" width="50" height="3" rx="2" fill="#91a3bd" fill-opacity="0.20"/>

  </g>

</svg>
